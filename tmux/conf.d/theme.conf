# ============================================
# Theme - AstroDark
# Unified with nvim AstroDark colorscheme
# ============================================

# --- Background System ---
%hidden BASE="#1A1D23"
%hidden SURFACE="#1E222A"
%hidden OVERLAY="#23272F"
%hidden BORDER="#3A3E47"
%hidden MUTED="#696C76"
%hidden TEXT="#ADB0BB"

# --- Accent Colors ---
%hidden BLUE="#50A4E9"
%hidden GREEN="#75AD47"
%hidden YELLOW="#D09214"
%hidden RED="#F8747E"
%hidden PURPLE="#CC83E3"
%hidden CYAN="#00B298"
%hidden ORANGE="#EB8332"

# --- Pane Borders ---
set -g pane-border-style "fg=#{BORDER}"
set -g pane-active-border-style "fg=#{BLUE}"
set -g pane-border-lines single

# --- Message Style ---
set -g message-style "bg=#{BLUE},fg=#{BASE}"
set -g message-command-style "bg=#{OVERLAY},fg=#{TEXT}"

# --- Copy Mode / Selection ---
set -g mode-style "bg=#{BLUE},fg=#{BASE}"

# --- Clock ---
set -g clock-mode-colour "#50A4E9"

# --- Scrollbar Style ---
set -g pane-scrollbars-style "fg=#{TEXT},bg=#{BORDER}"

# --- Popup Style ---
set -g popup-border-style "fg=#{BORDER}"
