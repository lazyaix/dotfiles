# ============================================
# Copy Mode & Mouse Integration
# Relies on set-clipboard on (OSC 52) for system clipboard
# ============================================

# --- Mouse drag: highlight only, Enter to copy ---
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection

# --- Double-click: select word, stay in copy mode ---
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind -T root DoubleClick1Pane select-pane -t = \; \
  if-shell -F "#{mouse_any_flag}" "send-keys -M" \
  "copy-mode -H ; send-keys -X select-word"

# --- Triple-click: select line without trailing newline ---
bind -T copy-mode-vi TripleClick1Pane select-pane \; \
  send-keys -X select-line \; send-keys -X cursor-left
bind -T root TripleClick1Pane select-pane -t = \; \
  if-shell -F "#{mouse_any_flag}" "send-keys -M" \
  "copy-mode -H ; send-keys -X select-line ; send-keys -X cursor-left"

# --- Middle-click: paste from buffer ---
bind -T root MouseMiddle1Pane select-pane -t = \; \
  if-shell -F "#{mouse_any_flag}" "send-keys -M" "paste-buffer -p"

# --- Scroll: auto-exit copy mode when reaching bottom ---
bind -T root WheelUpPane \
  if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
  "send-keys -M" "copy-mode -e"

# --- Vi copy-mode keys ---
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send-keys -X select-line \; send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi q send-keys -X cancel
