# ============================================
# Status Bar - Context Adaptive
# Minimal locally, show hostname over SSH
# ============================================

# --- Basic Settings ---
set -g status on
set -g status-position bottom
set -g status-interval 1
set -g status-justify left
set -g status-left-length 50
set -g status-right-length 100

# --- Status Bar Style ---
set -g status-style "bg=default,fg=#{TEXT}"

# --- Left: Session Name ---
set -g status-left "#[fg=#{BASE} bg=#{BLUE} bold] #S #[default] "

# --- Window Tabs ---
set -g window-status-format "#[fg=#{MUTED}] #I:#W "
set -g window-status-current-format "#[fg=#{BLUE} bold] #I:#W "
set -g window-status-separator ""

# --- Right: Context Adaptive ---
# Show highlighted hostname over SSH, only time locally
set -g status-right "#{?#{SSH_CONNECTION},#[fg=#{BASE} bg=#{ORANGE} bold] #h #[default] ,}#[fg=#{MUTED}]%Y-%m-%d %H:%M:%S "
